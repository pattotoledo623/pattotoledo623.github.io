<html>
    <head>
        <meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Latest compiled and minified CSS -->

        <!-- Latest compiled JavaScript -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

        <!--Uso de la libreria jQuery-->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

        <link rel="stylesheet" type="text/css" href="src/css/styles.css">
        <script type="text/javascript" src="src/js/funcionalidad/funcionalidad.js"></script>
    </head>
    <body style="width: 100%; height: 100%;">
        <div><h1>¿Quieres ser mi novia?</h1></div>
        <div class="respuestas">
            <div class="primera">
               <a href="#openModal"><button>Si</button></a>
            </div>
            <div id="segunda-respuesta" class="segunda">
               <button>No</button>
            </div>
            <div style="width: auto; height: auto;" id="tercera-respuesta" class="tercera">
                <a href="regresive.html">
                    <button style="width: auto; height: auto;">En 8 años papito</button>
                </a>
            </div>
        </div>
        <div id="openModal" class="modalDialog">
            <div>
                <p class="h2 text-white">¿Sabes qué?</p>
                <p class="text-white">Ya no quiero ser tu novio 7n7.</p>
                <p class="text-white">Y si mejor nos casamos? 0.0</p>
                <div class="row">
                    <div class="col">
                        <button id="boton_modal_si" onclick="Respuesta_SI()">Si</button>
                    </div>
                    <div class="col">
                        <button id="boton_modal_no" onclick="Respuesta_NO()">No</button>
                    </div>
                </div>
            </div>
        </div>
    </body>
    <script>
        let boton_no = document.getElementsByClassName('segunda')[0];
    
        boton_no.onmouseover = () => {
            boton_no.style.position = "absolute";
            boton_no.style.left = Math.random() * (window.innerWidth - boton_no.offsetWidth) + 'px';
            boton_no.style.top = Math.random() * (window.innerHeight - boton_no.offsetHeight) + 'px';
        }
    
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
